  - DOMAIN,mesu.apple.com,REJECT
  - DOMAIN,gdmf.apple.com,REJECT
  - DOMAIN,updates-http.apple.com,REJECT
  # === BLOCK QUIC FOR YOUTUBE MITM ===
  # AND,((DOMAIN-SUFFIX,googlevideo.com), (PROTOCOL,UDP)),REJECT
  # AND,((DOMAIN,youtubei.googleapis.com), (PROTOCOL,UDP)),REJECT
  # === BLOCK WEBRTC LEAK (Specific servers) ===
  # Note: Generic KEYWORD stun/turn removed â€” breaks VoIP (FaceTime, WhatsApp, Zoom)
  - domain_suffix:
      match: "stun.l.google.com"
      policy: REJECT
  - domain_suffix:
      match: "stun1.l.google.com"
      policy: REJECT
  - domain_suffix:
      match: "stun2.l.google.com"
      policy: REJECT
