rules:
  # Spotify Ads Block
  - domain_suffix:
      match: "audio-ak-spotify-com.akamaized.net"
      policy: REJECT
  - domain_suffix:
      match: "audio4-ak-spotify-com.akamaized.net"
      policy: REJECT
  - domain_suffix:
      match: "heads-ak-spotify-com.akamaized.net"
      policy: REJECT
  - domain_suffix:
      match: "heads4-ak-spotify-com.akamaized.net"
      policy: REJECT
  - domain:
      match: "spclient.wg.spotify.com"
      policy: DIRECT
  - domain_keyword:
      match: "spotify-ads"
      policy: REJECT

url_rewrites:
  # YouTube Ads Block
  - match: "^https?://[\\w-]+\\.googlevideo\\.com/(?!(dclk_video_ads|videoplayback\\?)).+&oad"
    location: "reject-200"
    status_code: 200
  - match: "^https?://(www|s)\\.youtube\\.com/api/stats/ads"
    location: "reject-200"
    status_code: 200
  - match: "^https?://(www|s)\\.youtube\\.com/(pagead|ptracking)"
    location: "reject-200"
    status_code: 200
  - match: "^https?://s\\.youtube\\.com/api/stats/qoe\\?adcontext"
    location: "reject-200"
    status_code: 200

header_rewrites:
  # RevenueCat Remove ETag
  - match: "^https?://api\\.revenuecat\\.com/.+/(receipts$|subscribers/?(.*?)*$)"
    action: del
    field: "x-revenuecat-etag"
  - match: "^https?://api\\.revenuecat\\.com/.+/(receipts$|subscribers/?(.*?)*$)"
    action: del
    field: "X-RevenueCat-ETag"
  - match: "^https?://api\\.rc-backup\\.com/.+/(receipts$|subscribers/?(.*?)*$)"
    action: del
    field: "x-revenuecat-etag"
  - match: "^https?://api\\.rc-backup\\.com/.+/(receipts$|subscribers/?(.*?)*$)"
    action: del
    field: "X-RevenueCat-ETag"
  # Spotify Remove Cache
  - match: "^https://(spclient\\.wg\\.spotify\\.com|.*-spclient\\.spotify\\.com(:443)?)/user-customization-service/v1/customize$"
    action: del
    field: "if-none-match"

